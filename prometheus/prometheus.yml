global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node"
    static_configs:
      # Mock 10 ECS nodes by scraping the local node-exporter with different target labels.
      # The Grafana dashboard follows labels exported by the internal reference dashboard:
      # vendor/account/group/name/instance/iid. Replace targets with real ECS
      # node-exporter addresses when available, while keeping the same label semantics.
      - targets: ["node-exporter:9100"]
        labels:
          vendor: "内网云"
          account: "数据中台生产账户"
          group: "数据中台"
          name: "数据中台调度数据接入生产ECS01"
          iid: "i-mock-0001"
          cservice: "ecs"
          region: "内网"
          exp: "长期"
          instance: "10.10.20.11"
      - targets: ["node-exporter:9100"]
        labels:
          vendor: "内网云"
          account: "数据中台生产账户"

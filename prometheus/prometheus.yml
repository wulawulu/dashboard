global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node"
    static_configs:
      # Mock 10 ECS nodes by scraping the local node-exporter with different target labels.
      # Replace these targets with real ECS node-exporter addresses when available.
      - targets: ["node-exporter:9100"]
        labels:
          ecs_name: "ecs-01"
          instance: "ecs-01"
          ecs_display_name: "数据中台调度数据接入生产ECS01"
          ip: "10.10.20.11"
          instance_id: "i-mock-0001"
          env: "mock"
      - targets: ["node-exporter:9100"]
